<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} | SentimentPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-left"><a href="/" style="color: var(--accent); text-decoration: none;"><i class="fas fa-arrow-left"></i> BACK TO HUB</a></div>
        <div class="nav-center"><h1>SENTIMENT<span>PULSE</span></h1></div>
        <div class="nav-right"><a href="/logout" class="logout-btn">LOGOUT</a></div>
    </nav>

    <main class="container">
        <section class="feed-section">
            <h2 class="section-title">{{ title }} <span>{{ subtitle }}</span></h2>
            <input type="hidden" id="pageType" value="{{ type }}">
            <div id="loader"><div class="spinner"></div></div>
            <div id="newsFeed" class="news-grid"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
