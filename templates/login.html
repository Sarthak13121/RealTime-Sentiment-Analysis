<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In | SentimentPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="branding">
            <i class="fas fa-user-circle"></i>
            <h1>SENTIMENT<span>PULSE</span></h1>
            <p>Enter your details to continue</p>
        </div>

        <form action="/login" method="POST">
            <div class="field">
                <label>Username</label>
                <input type="text" name="name" placeholder="Sarthak Patel" required>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" placeholder="name@domain.com" required>
            </div>

            <div class="field">
                <label>Country</label>
                <div class="select-wrapper">
                    <select id="country" name="country" onchange="loadStates()" required>
                        <option value="">Loading Countries...</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>State</label>
                <div class="select-wrapper">
                    <select id="state" name="state" onchange="loadCities()" required>
                        <option value="">Select State</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>City</label>
                <div class="select-wrapper">
                    <select id="city" name="city" required>
                        <option value="">Select City</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-primary">NEXT</button>
        </form>
    </div>

    <script>
        const countrySel = document.getElementById('country');
        const stateSel = document.getElementById('state');
        const citySel = document.getElementById('city');

        // 1. Initial Load: Get all Countries
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch("https://countriesnow.space/api/v0.1/countries/iso");
                const result = await res.json();
                countrySel.innerHTML = '<option value="">Select Country</option>';
                result.data.forEach(c => {
                    countrySel.add(new Option(c.name, c.name));
                });
            } catch (e) {
                countrySel.innerHTML = '<option value="India">India (Offline Mode)</option>';
            }
        });

        // 2. Cascading: Load States based on Country
        async function loadStates() {
            const country = countrySel.value;
            stateSel.innerHTML = '<option value="">Loading States...</option>';
            citySel.innerHTML = '<option value="">--</option>';

            try {
                const res = await fetch("https://countriesnow.space/api/v0.1/countries/states", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ country: country })
                });
                const result = await res.json();
                stateSel.innerHTML = '<option value="">Select State</option>';
                result.data.states.forEach(s => {
                    stateSel.add(new Option(s.name, s.name));
                });
            } catch (e) {
                stateSel.innerHTML = '<option value="">Not Found</option>';
            }
        }

        // 3. Cascading: Load Cities based on State
        async function loadCities() {
            const country = countrySel.value;
            const state = stateSel.value;
            citySel.innerHTML = '<option value="">Loading Cities...</option>';

            try {
                const res = await fetch("https://countriesnow.space/api/v0.1/countries/state/cities", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ country: country, state: state })
                });
                const result = await res.json();
                citySel.innerHTML = '<option value="">Select City</option>';
                result.data.forEach(c => {
                    citySel.add(new Option(c, c));
                });
            } catch (e) {
                citySel.innerHTML = '<option value="">Select City</option>';
            }
        }
    </script>
</body>
</html>
