<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Interests | SentimentPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card" style="max-width: 700px;">
        <div class="branding">
            <i class="fas fa-layer-group"></i>
            <h1>SELECT YOUR<span>INTERESTS</span></h1>
            <p>Customize your intelligence feed based on your expertise</p>
        </div>
        
        <form action="/interests" method="POST">
            <h3 class="section-label">CHOOSE TOPICS</h3>
            <div class="chip-grid">
                <label class="chip"><input type="checkbox" name="category" value="Technology"><span>Technology</span></label>
                <label class="chip"><input type="checkbox" name="category" value="AI & ML"><span>AI & ML</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Cyber Security"><span>Cyber Security</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Business"><span>Business</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Finance"><span>Finance</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Sports"><span>Sports</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Space"><span>Space</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Automobiles"><span>Automobiles</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Environment"><span>Environment</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Health"><span>Health</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Science"><span>Science</span></label>
                <label class="chip"><input type="checkbox" name="category" value="Politics"><span>Politics</span></label>
            </div>
            
            <button type="submit" class="btn-primary" style="margin-top:40px;">FINALIZE SETUP</button>
        </form>
    </div>
</body>
</html>
